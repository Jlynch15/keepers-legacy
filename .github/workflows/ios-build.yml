name: iOS Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Free tier note:
#   Public repo  → unlimited macOS runner minutes (recommended)
#   Private repo → 2,000 min/month total; macOS costs 10x = ~200 min/month effective

jobs:
  build-and-test:
    name: Build & Test (Xcode 15, iOS 17 Simulator)
    runs-on: macos-14        # macOS Sonoma + Xcode 15.x

    steps:
      # ── 1. Check out the repository ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Select the right Xcode version ────────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── 3. Install xcodegen (generates .xcodeproj from project.yml) ──────
      - name: Install xcodegen
        run: brew install xcodegen

      # ── 4. Generate the Xcode project ────────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate

      # ── 5. Cache derived data for faster subsequent builds ───────────────
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('project.yml', 'KeeperLegacy/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      # ── 6. Build the app (no code signing needed for simulator) ──────────
      - name: Build
        run: |
          xcodebuild \
            -scheme KeeperLegacy \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color || exit 1

      # ── 7. Run unit tests ─────────────────────────────────────────────────
      - name: Test
        run: |
          xcodebuild \
            -scheme KeeperLegacy \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            test \
            | xcpretty --color || exit 1

      # ── 8. Upload build logs on failure ──────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/
          retention-days: 7
