<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- STONEWORK — dirt, uncommon — carves intricate patterns with hardened claws
       Mutations: v1 Marble White · v2 Obsidian · v3 Sandstone · v4 Moss Green
       Signature: chiseled square body with carved pattern lines + chisel-like claws
  -->
  <!-- PALETTE
       v1: body-base=#e8e0d0 body-shadow=#a89880 body-highlight=#fff8e8 body-stroke=#3a2818 accent-base=#c8b89a accent-shadow=#786850 accent-highlight=#fff8e8
       v2: body-base=#1a1820 body-shadow=#000000 body-highlight=#3a3848 body-stroke=#000000 accent-base=#3a3850 accent-shadow=#1a1828 accent-highlight=#5a5878
       v3: body-base=#d8b878 body-shadow=#80683a body-highlight=#f0d8a0 body-stroke=#382818 accent-base=#a08858 accent-shadow=#5a4828 accent-highlight=#d8c098
       v4: body-base=#789860 body-shadow=#385030 body-highlight=#a8c088 body-stroke=#181a08 accent-base=#587848 accent-shadow=#283820 accent-highlight=#88a878
  -->
  <style>
    .body-base       { fill: #e8e0d0; }
    .body-base       { stroke: #e8e0d0; }
    .body-shadow     { fill: #a89880; }
    .body-shadow     { stroke: #a89880; }
    .body-highlight  { fill: #fff8e8; }
    .body-highlight  { stroke: #fff8e8; }
    .body-stroke     { fill: #3a2818; }
    .body-stroke     { stroke: #3a2818; }
    .accent-base     { fill: #c8b89a; }
    .accent-base     { stroke: #c8b89a; }
    .accent-shadow   { fill: #786850; }
    .accent-shadow   { stroke: #786850; }
    .accent-highlight{ fill: #fff8e8; }
    .accent-highlight{ stroke: #fff8e8; }
    .eye-iris        { fill: #6a4830; }
    .eye-pupil       { fill: #1a0a00; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f8f0e0; }
    .mouth-interior  { fill: #2a1008; }
  </style>

  <!-- feet -->
  <rect x="180" y="430" width="48" height="20" class="body-shadow"/>
  <rect x="184" y="426" width="40" height="14" class="body-base"/>
  <rect x="284" y="430" width="48" height="20" class="body-shadow"/>
  <rect x="288" y="426" width="40" height="14" class="body-base"/>

  <!-- chisel claws (signature: hardened chisel-shaped claws held proudly) -->
  <!-- left claw arm + chisel hand -->
  <ellipse cx="142" cy="306" rx="34" ry="20" class="body-shadow" transform="rotate(-20 142 306)"/>
  <ellipse cx="146" cy="302" rx="28" ry="15" class="body-base"   transform="rotate(-20 146 302)"/>
  <path d="M86,312 L116,300 L116,330 Z" class="accent-shadow"/>
  <path d="M92,310 L114,302 L114,326 Z" class="accent-base"/>
  <path d="M104,310 L92,310 L98,304 Z" class="accent-highlight"/>
  <!-- right claw arm + chisel hand -->
  <ellipse cx="370" cy="306" rx="34" ry="20" class="body-shadow" transform="rotate(20 370 306)"/>
  <ellipse cx="366" cy="302" rx="28" ry="15" class="body-base"   transform="rotate(20 366 302)"/>
  <path d="M426,312 L396,300 L396,330 Z" class="accent-shadow"/>
  <path d="M420,310 L398,302 L398,326 Z" class="accent-base"/>
  <path d="M408,310 L420,310 L414,304 Z" class="accent-highlight"/>

  <!-- ═══════ CHISELED SQUARE BODY ═══════ -->
  <rect x="156" y="170" width="200" height="252" rx="14" class="body-shadow"/>
  <rect x="160" y="172" width="192" height="246" rx="12" class="body-base"/>
  <ellipse cx="208" cy="210" rx="56" ry="20" class="body-highlight" opacity="0.55"/>

  <!-- carved pattern lines (signature) -->
  <path d="M180,260 L196,270 L180,280 L196,290 L180,300" class="accent-shadow" fill="none" stroke-width="2.5" opacity="0.8"/>
  <path d="M332,260 L316,270 L332,280 L316,290 L332,300" class="accent-shadow" fill="none" stroke-width="2.5" opacity="0.8"/>
  <path d="M210,376 L302,376" class="accent-shadow" fill="none" stroke-width="2.5" opacity="0.8"/>
  <path d="M210,388 L302,388" class="accent-shadow" fill="none" stroke-width="2.5" opacity="0.8"/>
  <!-- carved diamond center -->
  <path d="M256,332 L276,352 L256,372 L236,352 Z" class="accent-shadow" fill="none" stroke-width="3"/>
  <path d="M256,342 L266,352 L256,362 L246,352 Z" class="accent-shadow" stroke="none" opacity="0.4"/>

  <!-- ═══════ EYES (dirt family — SHARP WEDGE highlight, chisel theme) ═══════ -->
  <ellipse cx="220" cy="252" rx="22" ry="22" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="252" rx="18" ry="18" fill="none" stroke="#3a2818" stroke-width="2.5"/>
  <circle  cx="222" cy="256" r="12" class="eye-iris"/>
  <circle  cx="222" cy="256" r="7"  class="eye-pupil"/>
  <!-- wedge-shaped highlight -->
  <path d="M226,246 L232,250 L226,254 Z" class="eye-highlight" stroke="none"/>
  <ellipse cx="292" cy="252" rx="22" ry="22" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="252" rx="18" ry="18" fill="none" stroke="#3a2818" stroke-width="2.5"/>
  <circle  cx="290" cy="256" r="12" class="eye-iris"/>
  <circle  cx="290" cy="256" r="7"  class="eye-pupil"/>
  <path d="M286,246 L280,250 L286,254 Z" class="eye-highlight" stroke="none"/>

  <!-- mouth: focused tight smile (closed thin line, no curve) -->
  <path d="M232,300 L280,300" class="body-stroke" fill="none" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ambient dust -->
  <circle cx="60"  cy="430" r="2" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="92"  cy="466" r="1.5" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="450" cy="430" r="2" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="420" cy="466" r="1.5" class="body-base" opacity="0.5" stroke="none"/>

  <!-- stone chip particles -->
  <circle cx="72" cy="280" r="3" class="accent-base" opacity="0.6" stroke="none"/>
  <circle cx="50" cy="356" r="2" class="accent-base" opacity="0.55" stroke="none"/>
  <circle cx="448" cy="280" r="3" class="accent-base" opacity="0.6" stroke="none"/>
  <circle cx="464" cy="356" r="2" class="accent-base" opacity="0.55" stroke="none"/>

  <!-- sparkles -->
  <path d="M84,128 L86,134 L92,136 L86,138 L84,144 L82,138 L76,136 L82,134 Z"
        fill="#ffffff" opacity="0.85"/>
  <path d="M428,128 L430,134 L436,136 L430,138 L428,144 L426,138 L420,136 L426,134 Z"
        fill="#ffffff" opacity="0.85"/>
</svg>
