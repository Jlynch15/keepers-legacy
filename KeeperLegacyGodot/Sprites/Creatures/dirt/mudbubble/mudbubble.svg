<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- MUDBUBBLE — dirt, common — loves mud baths, muddier the better
       Mutations: v1 Chocolate Brown · v2 Clay Red · v3 Grey Mud · v4 Pale Yellow
       Signature: blob-shaped with mud drips and a HUGE happy drooly grin
  -->
  <!-- PALETTE
       v1: body-base=#684020 body-shadow=#382010 body-highlight=#a8704a body-stroke=#1a0800 accent-base=#503018 accent-shadow=#2a1808 accent-highlight=#88582a
       v2: body-base=#a04830 body-shadow=#5a2010 body-highlight=#d8784a body-stroke=#280800 accent-base=#883820 accent-shadow=#4a1808 accent-highlight=#c0603a
       v3: body-base=#787068 body-shadow=#403830 body-highlight=#a89890 body-stroke=#1a1a1a accent-base=#605850 accent-shadow=#302820 accent-highlight=#98908a
       v4: body-base=#e8d878 body-shadow=#a08038 body-highlight=#fff8a8 body-stroke=#382808 accent-base=#c0a850 accent-shadow=#705820 accent-highlight=#f8e898
  -->
  <style>
    .body-base       { fill: #684020; }
    .body-base       { stroke: #684020; }
    .body-shadow     { fill: #382010; }
    .body-shadow     { stroke: #382010; }
    .body-highlight  { fill: #a8704a; }
    .body-highlight  { stroke: #a8704a; }
    .body-stroke     { fill: #1a0800; }
    .body-stroke     { stroke: #1a0800; }
    .accent-base     { fill: #503018; }
    .accent-base     { stroke: #503018; }
    .accent-shadow   { fill: #2a1808; }
    .accent-shadow   { stroke: #2a1808; }
    .accent-highlight{ fill: #88582a; }
    .accent-highlight{ stroke: #88582a; }
    .eye-iris        { fill: #4a3018; }
    .eye-pupil       { fill: #1a0a00; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f8f0e0; }
    .mouth-interior  { fill: #2a0808; }
    .tongue          { fill: #d04060; }
  </style>

  <!-- ═══════ BLOB BODY (mud blob with irregular bumpy outline) ═══════ -->
  <path d="M120,332 Q104,224 200,184 Q256,164 312,184 Q408,224 392,332 Q416,408 392,440 Q336,468 256,452 Q176,468 120,440 Q96,408 120,332 Z" class="body-shadow"/>
  <path d="M128,332 Q112,232 204,194 Q256,176 308,194 Q400,232 384,332 Q406,400 384,432 Q330,460 256,446 Q182,460 128,432 Q106,400 128,332 Z" class="body-base"/>
  <ellipse cx="208" cy="240" rx="48" ry="28" class="body-highlight" opacity="0.42"/>
  <ellipse cx="256" cy="396" rx="55" ry="14" class="body-highlight" opacity="0.32"/>

  <!-- ═══════ MUD DRIPS (signature: dripping mud) ═══════ -->
  <path d="M156,400 Q152,440 162,460 Q170,440 162,400 Z" class="accent-shadow"/>
  <path d="M348,388 Q360,432 350,460 Q344,432 348,388 Z" class="accent-shadow"/>
  <path d="M232,438 Q228,468 240,484 Q244,468 240,440 Z" class="accent-shadow"/>
  <path d="M280,438 Q276,468 288,484 Q292,468 288,440 Z" class="accent-shadow"/>
  <!-- mud drip droplets -->
  <circle cx="158" cy="476" r="6" class="accent-shadow"/>
  <circle cx="158" cy="474" r="4" class="accent-base"/>
  <circle cx="354" cy="478" r="6" class="accent-shadow"/>
  <circle cx="354" cy="476" r="4" class="accent-base"/>

  <!-- mud splatter spots on body -->
  <circle cx="190" cy="276" r="8" class="accent-shadow"/>
  <circle cx="316" cy="290" r="10" class="accent-shadow"/>
  <circle cx="244" cy="376" r="7" class="accent-shadow"/>

  <!-- ═══════ EYES (dirt family — HUGE happy round, MUD-DROP highlight) ═══════ -->
  <ellipse cx="218" cy="290" rx="32" ry="36" class="eye-sclera" stroke="none"/>
  <ellipse cx="218" cy="290" rx="28" ry="32" fill="none" stroke="#1a0800" stroke-width="3"/>
  <circle  cx="220" cy="296" r="20" class="eye-iris"/>
  <circle  cx="220" cy="296" r="13" class="eye-pupil"/>
  <!-- mud-drop highlight (teardrop shape pointing down) -->
  <path d="M226,278 Q232,290 226,296 Q220,290 226,278 Z" class="eye-highlight" stroke="none"/>
  <circle cx="216" cy="306" r="2" class="eye-highlight" stroke="none"/>
  <ellipse cx="294" cy="290" rx="32" ry="36" class="eye-sclera" stroke="none"/>
  <ellipse cx="294" cy="290" rx="28" ry="32" fill="none" stroke="#1a0800" stroke-width="3"/>
  <circle  cx="292" cy="296" r="20" class="eye-iris"/>
  <circle  cx="292" cy="296" r="13" class="eye-pupil"/>
  <path d="M286,278 Q280,290 286,296 Q292,290 286,278 Z" class="eye-highlight" stroke="none"/>
  <circle cx="296" cy="306" r="2" class="eye-highlight" stroke="none"/>

  <!-- ═══════ HUGE DROOLY GRIN (signature mouth) ═══════ -->
  <path d="M196,360 Q256,420 316,360 Q288,392 256,392 Q224,392 196,360 Z" class="mouth-interior"
        stroke="#1a0800" stroke-width="3" stroke-linejoin="round"/>
  <ellipse cx="256" cy="394" rx="34" ry="14" class="tongue" stroke="none"/>
  <!-- drool drip from corner of mouth -->
  <ellipse cx="312" cy="378" rx="3" ry="6" fill="#80c0e0" opacity="0.85" stroke="none"/>
  <circle cx="312" cy="394" r="3" fill="#80c0e0" opacity="0.85" stroke="none"/>

  <!-- cheek blush -->
  <ellipse cx="170" cy="338" rx="14" ry="9" fill="#c06848" opacity="0.55" stroke="none"/>
  <ellipse cx="342" cy="338" rx="14" ry="9" fill="#c06848" opacity="0.55" stroke="none"/>

  <!-- body specks -->
  <circle cx="172" cy="350" r="2" class="body-highlight" opacity="0.55" stroke="none"/>
  <circle cx="346" cy="368" r="2" class="body-highlight" opacity="0.55" stroke="none"/>

  <!-- ambient dust -->
  <circle cx="60"  cy="430" r="2" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="92"  cy="466" r="1.5" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="450" cy="430" r="2" class="body-base" opacity="0.5" stroke="none"/>
  <circle cx="420" cy="466" r="1.5" class="body-base" opacity="0.5" stroke="none"/>

  <!-- sparkles -->
  <path d="M88,170 L90,176 L96,178 L90,180 L88,186 L86,180 L80,178 L86,176 Z"
        fill="#ffffff" opacity="0.85"/>
  <path d="M424,170 L426,176 L432,178 L426,180 L424,186 L422,180 L416,178 L422,176 Z"
        fill="#ffffff" opacity="0.85"/>
</svg>
