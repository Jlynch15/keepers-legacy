<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- BLIZZARDBORNE — ice, uncommon — rides self-generated mini blizzard
       Mutations: v1 Storm White · v2 Grey Blue · v3 Pale Violet · v4 Arctic Blue
       Signature: head atop SWIRLING BLIZZARD CYCLONE (lower body is blizzard)
  -->
  <!-- PALETTE
       v1: body-base=#e8e8f0 body-shadow=#a0a0b0 body-highlight=#ffffff body-stroke=#383848 accent-base=#d0d8e8 accent-shadow=#7888a0 accent-highlight=#ffffff
       v2: body-base=#7090a8 body-shadow=#385068 body-highlight=#a0b8d0 body-stroke=#10202a accent-base=#90b0c8 accent-shadow=#506880 accent-highlight=#c0d8e8
       v3: body-base=#b0a8c8 body-shadow=#605880 body-highlight=#d8d0e8 body-stroke=#201828 accent-base=#a098c0 accent-shadow=#605878 accent-highlight=#d0c8e0
       v4: body-base=#7898c8 body-shadow=#385080 body-highlight=#a8c0e8 body-stroke=#001828 accent-base=#a0b8d8 accent-shadow=#587898 accent-highlight=#d0e0f0
  -->
  <style>
    .body-base       { fill: #e8e8f0; }
    .body-base       { stroke: #e8e8f0; }
    .body-shadow     { fill: #a0a0b0; }
    .body-shadow     { stroke: #a0a0b0; }
    .body-highlight  { fill: #ffffff; }
    .body-highlight  { stroke: #ffffff; }
    .body-stroke     { fill: #383848; }
    .body-stroke     { stroke: #383848; }
    .accent-base     { fill: #d0d8e8; }
    .accent-base     { stroke: #d0d8e8; }
    .accent-shadow   { fill: #7888a0; }
    .accent-shadow   { stroke: #7888a0; }
    .accent-highlight{ fill: #ffffff; }
    .accent-highlight{ stroke: #ffffff; }
    .eye-iris        { fill: #5090c0; }
    .eye-pupil       { fill: #001828; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f0f8ff; }
    .mouth-interior  { fill: #102838; }
  </style>

  <!-- Custom glow: blizzard cyclone (signature is the storm itself) -->
  <ellipse cx="256" cy="380" rx="180" ry="80" fill="#d0e0f0" opacity="0.45"/>
  <ellipse cx="256" cy="380" rx="140" ry="60" fill="#ffffff" opacity="0.4"/>

  <!-- ═══════ BLIZZARD CYCLONE BASE (signature) ═══════ -->
  <path d="M148,460 Q256,478 364,460 Q400,470 364,484 Q256,494 148,484 Q116,470 148,460 Z" class="accent-shadow"/>
  <path d="M156,440 Q256,456 356,440 Q386,452 356,464 Q256,472 156,464 Q126,452 156,440 Z" class="accent-base"/>
  <path d="M170,418 Q256,432 342,418 Q368,428 342,438 Q256,444 170,438 Q146,428 170,418 Z" class="accent-shadow"/>
  <path d="M180,398 Q256,410 332,398 Q354,406 332,414 Q256,420 180,414 Q160,406 180,398 Z" class="accent-base"/>
  <path d="M194,378 Q256,388 318,378 Q336,386 318,392 Q256,398 194,392 Q176,386 194,378 Z" class="accent-shadow"/>
  <path d="M200,358 Q256,366 312,358 Q328,364 312,370 Q256,376 200,370 Q186,364 200,358 Z" class="accent-base"/>

  <!-- swirl streaks in cyclone -->
  <path d="M188,410 Q220,400 252,408" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M260,460 Q296,452 324,464" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M204,378 Q230,370 256,378" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>

  <!-- snowflakes in cyclone -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.95" stroke-linecap="round">
    <line x1="200" y1="450" x2="208" y2="450"/>
    <line x1="204" y1="446" x2="204" y2="454"/>
    <line x1="316" y1="430" x2="324" y2="430"/>
    <line x1="320" y1="426" x2="320" y2="434"/>
    <line x1="240" y1="468" x2="248" y2="468"/>
    <line x1="244" y1="464" x2="244" y2="472"/>
  </g>

  <!-- arms -->
  <ellipse cx="142" cy="280" rx="34" ry="14" class="body-shadow" transform="rotate(-25 142 280)"/>
  <ellipse cx="146" cy="277" rx="28" ry="10" class="body-base"   transform="rotate(-25 146 277)"/>
  <ellipse cx="370" cy="280" rx="34" ry="14" class="body-shadow" transform="rotate(25 370 280)"/>
  <ellipse cx="366" cy="277" rx="28" ry="10" class="body-base"   transform="rotate(25 366 277)"/>

  <!-- head/upper body -->
  <circle cx="256" cy="244" r="120" class="body-shadow"/>
  <circle cx="256" cy="238" r="112" class="body-base"/>
  <ellipse cx="216" cy="184" rx="22" ry="14" class="body-highlight" opacity="0.55"/>

  <!-- ═══════ EYES (ice family — wide, alert, winds-blowing) ═══════ -->
  <ellipse cx="220" cy="232" rx="24" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="232" rx="20" ry="22" fill="none" stroke="#383848" stroke-width="2.5"/>
  <circle cx="222" cy="238" r="14" class="eye-iris"/>
  <circle cx="222" cy="238" r="9" class="eye-pupil"/>
  <path d="M226,224 L230,228 L226,232 L222,228 Z" class="eye-highlight"/>
  <ellipse cx="292" cy="232" rx="24" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="232" rx="20" ry="22" fill="none" stroke="#383848" stroke-width="2.5"/>
  <circle cx="290" cy="238" r="14" class="eye-iris"/>
  <circle cx="290" cy="238" r="9" class="eye-pupil"/>
  <path d="M286,224 L282,228 L286,232 L290,228 Z" class="eye-highlight"/>

  <!-- mouth -->
  <path d="M222,288 Q256,308 290,288" class="body-stroke" fill="none" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ambient snowflakes -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.85" stroke-linecap="round">
    <line x1="60" y1="160" x2="68" y2="160"/>
    <line x1="64" y1="156" x2="64" y2="164"/>
    <line x1="450" y1="160" x2="458" y2="160"/>
    <line x1="454" y1="156" x2="454" y2="164"/>
    <line x1="80" y1="100" x2="86" y2="100"/>
    <line x1="83" y1="97" x2="83" y2="103"/>
    <line x1="426" y1="100" x2="432" y2="100"/>
    <line x1="429" y1="97" x2="429" y2="103"/>
  </g>
</svg>
