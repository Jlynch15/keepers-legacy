<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- FROSTBITE — ice, common — playful nip with ice teeth, puppy-like
       Mutations: v1 Arctic White · v2 Ice Blue · v3 Pale Grey · v4 Teal Ice
       Signature: puppy-shape with VISIBLE ICE TEETH in open mouth (playful)
  -->
  <!-- PALETTE
       v1: body-base=#f0f8ff body-shadow=#a8b8c8 body-highlight=#ffffff body-stroke=#3a5060 accent-base=#a8d8f0 accent-shadow=#6098c0 accent-highlight=#d8f0ff
       v2: body-base=#a8d0e8 body-shadow=#5088a8 body-highlight=#d8f0ff body-stroke=#1a4060 accent-base=#80c0e8 accent-shadow=#3878a0 accent-highlight=#c0e0f8
       v3: body-base=#c8c8d0 body-shadow=#686878 body-highlight=#e8e8f0 body-stroke=#202830 accent-base=#a0a0b0 accent-shadow=#585868 accent-highlight=#d0d0d8
       v4: body-base=#80c8c8 body-shadow=#388080 body-highlight=#a8e0e0 body-stroke=#082828 accent-base=#a0d8d8 accent-shadow=#508888 accent-highlight=#c8f0f0
  -->
  <style>
    .body-base       { fill: #f0f8ff; }
    .body-base       { stroke: #f0f8ff; }
    .body-shadow     { fill: #a8b8c8; }
    .body-shadow     { stroke: #a8b8c8; }
    .body-highlight  { fill: #ffffff; }
    .body-highlight  { stroke: #ffffff; }
    .body-stroke     { fill: #3a5060; }
    .body-stroke     { stroke: #3a5060; }
    .accent-base     { fill: #a8d8f0; }
    .accent-base     { stroke: #a8d8f0; }
    .accent-shadow   { fill: #6098c0; }
    .accent-shadow   { stroke: #6098c0; }
    .accent-highlight{ fill: #d8f0ff; }
    .accent-highlight{ stroke: #d8f0ff; }
    .eye-iris        { fill: #5090c0; }
    .eye-pupil       { fill: #001828; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f0f8ff; }
    .mouth-interior  { fill: #102838; }
  </style>

  <!-- Custom glow: small ice-puff cloud around the mouth (the playful nip source) -->
  <ellipse cx="256" cy="356" rx="80" ry="32" fill="#c0e8f8" opacity="0.45"/>
  <ellipse cx="256" cy="356" rx="58" ry="22" fill="#ffffff" opacity="0.5"/>

  <!-- feet -->
  <ellipse cx="208" cy="436" rx="32" ry="14" class="body-shadow"/>
  <ellipse cx="304" cy="436" rx="32" ry="14" class="body-shadow"/>
  <ellipse cx="208" cy="432" rx="26" ry="11" class="body-base"/>
  <ellipse cx="304" cy="432" rx="26" ry="11" class="body-base"/>

  <!-- arms -->
  <ellipse cx="138" cy="306" rx="34" ry="18" class="body-shadow" transform="rotate(-12 138 306)"/>
  <ellipse cx="142" cy="302" rx="28" ry="13" class="body-base"   transform="rotate(-12 142 302)"/>
  <ellipse cx="374" cy="306" rx="34" ry="18" class="body-shadow" transform="rotate(12 374 306)"/>
  <ellipse cx="370" cy="302" rx="28" ry="13" class="body-base"   transform="rotate(12 370 302)"/>

  <!-- body -->
  <circle cx="256" cy="296" r="118" class="body-shadow"/>
  <circle cx="256" cy="290" r="110" class="body-base"/>
  <ellipse cx="216" cy="234" rx="22" ry="14" class="body-highlight" opacity="0.65"/>

  <!-- floppy puppy ears -->
  <ellipse cx="180" cy="180" rx="22" ry="36" class="body-shadow" transform="rotate(-25 180 180)"/>
  <ellipse cx="184" cy="178" rx="18" ry="32" class="body-base"   transform="rotate(-25 184 178)"/>
  <ellipse cx="332" cy="180" rx="22" ry="36" class="body-shadow" transform="rotate(25 332 180)"/>
  <ellipse cx="328" cy="178" rx="18" ry="32" class="body-base"   transform="rotate(25 328 178)"/>

  <!-- ═══════ EYES (ice family — bright eager puppy eyes, snowflake highlight) ═══════ -->
  <ellipse cx="220" cy="282" rx="24" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="282" rx="20" ry="22" fill="none" stroke="#3a5060" stroke-width="2.5"/>
  <circle cx="222" cy="288" r="14" class="eye-iris"/>
  <circle cx="222" cy="288" r="9" class="eye-pupil"/>
  <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="222" y1="278" x2="230" y2="278"/>
    <line x1="226" y1="274" x2="226" y2="282"/>
    <line x1="223" y1="275" x2="229" y2="281"/>
    <line x1="223" y1="281" x2="229" y2="275"/>
  </g>
  <ellipse cx="292" cy="282" rx="24" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="282" rx="20" ry="22" fill="none" stroke="#3a5060" stroke-width="2.5"/>
  <circle cx="290" cy="288" r="14" class="eye-iris"/>
  <circle cx="290" cy="288" r="9" class="eye-pupil"/>
  <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="282" y1="278" x2="290" y2="278"/>
    <line x1="286" y1="274" x2="286" y2="282"/>
    <line x1="283" y1="275" x2="289" y2="281"/>
    <line x1="283" y1="281" x2="289" y2="275"/>
  </g>

  <!-- ═══════ ICE TEETH OPEN MOUTH (signature) ═══════ -->
  <path d="M210,332 Q256,372 302,332 Q280,360 256,360 Q232,360 210,332 Z" class="mouth-interior"/>
  <!-- ice teeth -->
  <path d="M222,338 L226,354 L230,338 Z" fill="#ffffff"/>
  <path d="M232,340 L236,358 L240,340 Z" fill="#e8f0f8"/>
  <path d="M244,342 L248,360 L252,342 Z" fill="#ffffff"/>
  <path d="M260,342 L264,360 L268,342 Z" fill="#ffffff"/>
  <path d="M272,340 L276,358 L280,340 Z" fill="#e8f0f8"/>
  <path d="M282,338 L286,354 L290,338 Z" fill="#ffffff"/>

  <!-- frost breath puff -->
  <ellipse cx="220" cy="380" rx="12" ry="5" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="296" cy="382" rx="10" ry="4" fill="#ffffff" opacity="0.6"/>

  <!-- cheek -->
  <ellipse cx="178" cy="324" rx="11" ry="7" fill="#80b8d0" opacity="0.5" stroke="none"/>
  <ellipse cx="334" cy="324" rx="11" ry="7" fill="#80b8d0" opacity="0.5" stroke="none"/>

  <!-- ambient snowflakes -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.85" stroke-linecap="round">
    <line x1="60" y1="180" x2="68" y2="180"/>
    <line x1="64" y1="176" x2="64" y2="184"/>
    <line x1="450" y1="180" x2="458" y2="180"/>
    <line x1="454" y1="176" x2="454" y2="184"/>
    <line x1="80" y1="120" x2="86" y2="120"/>
    <line x1="83" y1="117" x2="83" y2="123"/>
  </g>
</svg>
