<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- PERMAFROST — ice, RARE — ancient massive, deep blue inner core
       Mutations: v1 Deep Ice Blue · v2 Grey · v3 Pale White · v4 Midnight Blue
       Signature: massive icy body with GLOWING DEEP BLUE INNER CORE visible through ice
  -->
  <!-- PALETTE
       v1: body-base=#3878a8 body-shadow=#103858 body-highlight=#5898 c8 body-stroke=#000820 accent-base=#80c8ff accent-shadow=#3878 b0 accent-highlight=#c0e8ff
       v2: body-base=#8088 90 body-shadow=#384048 body-highlight=#a8b0b8 body-stroke=#181820 accent-base=#80b0d0 accent-shadow=#386878 accent-highlight=#c0d8e8
       v3: body-base=#d8e0e8 body-shadow=#80a0b0 body-highlight=#ffffff body-stroke=#283848 accent-base=#a8d8f0 accent-shadow=#5090b8 accent-highlight=#d8f0ff
       v4: body-base=#102848 body-shadow=#000818 body-highlight=#284868 body-stroke=#000000 accent-base=#3878 b0 accent-shadow=#103858 accent-highlight=#5098 d0
  -->
  <style>
    .body-base       { fill: #3878a8; }
    .body-base       { stroke: #3878a8; }
    .body-shadow     { fill: #103858; }
    .body-shadow     { stroke: #103858; }
    .body-highlight  { fill: #5898c8; }
    .body-highlight  { stroke: #5898c8; }
    .body-stroke     { fill: #000820; }
    .body-stroke     { stroke: #000820; }
    .accent-base     { fill: #80c8ff; }
    .accent-base     { stroke: #80c8ff; }
    .accent-shadow   { fill: #3878b0; }
    .accent-shadow   { stroke: #3878b0; }
    .accent-highlight{ fill: #c0e8ff; }
    .accent-highlight{ stroke: #c0e8ff; }
    .eye-iris        { fill: #80c8ff; }
    .eye-pupil       { fill: #000818; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #c0e0f0; }
    .mouth-interior  { fill: #000818; }
  </style>

  <!-- Custom glow: deep core glow visible THROUGH the body (signature) -->
  <ellipse cx="256" cy="320" rx="80" ry="110" fill="#80c8ff" opacity="0.35"/>
  <ellipse cx="256" cy="320" rx="50" ry="80" fill="#c0e8ff" opacity="0.4"/>

  <!-- feet -->
  <ellipse cx="208" cy="448" rx="36" ry="14" class="body-shadow"/>
  <ellipse cx="304" cy="448" rx="36" ry="14" class="body-shadow"/>
  <ellipse cx="208" cy="444" rx="30" ry="11" class="body-base"/>
  <ellipse cx="304" cy="444" rx="30" ry="11" class="body-base"/>

  <!-- arms (heavy massive) -->
  <ellipse cx="120" cy="306" rx="42" ry="22" class="body-shadow" transform="rotate(-12 120 306)"/>
  <ellipse cx="124" cy="302" rx="36" ry="17" class="body-base"   transform="rotate(-12 124 302)"/>
  <ellipse cx="392" cy="306" rx="42" ry="22" class="body-shadow" transform="rotate(12 392 306)"/>
  <ellipse cx="388" cy="302" rx="36" ry="17" class="body-base"   transform="rotate(12 388 302)"/>

  <!-- ═══════ MASSIVE ICY BODY ═══════ -->
  <ellipse cx="256" cy="320" rx="138" ry="148" class="body-shadow"/>
  <ellipse cx="256" cy="314" rx="130" ry="140" class="body-base"/>
  <!-- ice cracks revealing deep core -->
  <path d="M256,200 L246,260 L262,310 L240,360 L260,400" class="accent-base" fill="none" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <path d="M180,260 L210,290 L196,320 L222,348" class="accent-base" fill="none" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M340,260 L312,290 L326,320 L298,348" class="accent-base" fill="none" stroke-width="2" opacity="0.6" stroke-linecap="round"/>

  <!-- icy plate facets on top -->
  <path d="M194,236 L226,206 L256,228 L228,254 Z" class="body-highlight" opacity="0.5"/>
  <path d="M256,228 L286,206 L318,236 L284,254 Z" class="body-highlight" opacity="0.5"/>

  <!-- ═══════ EYES (ice family — DEEP GLOWING blue, ancient and powerful) ═══════ -->
  <ellipse cx="220" cy="288" rx="22" ry="22" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="288" rx="18" ry="18" fill="none" stroke="#000820" stroke-width="2.5"/>
  <circle cx="222" cy="292" r="13" fill="#80c8ff"/>
  <circle cx="222" cy="292" r="13" fill="none" stroke="#3878b0" stroke-width="1.5"/>
  <circle cx="222" cy="292" r="8" class="eye-pupil"/>
  <path d="M226,284 L228,290 L226,294 L222,290 Z" class="eye-highlight"/>
  <ellipse cx="292" cy="288" rx="22" ry="22" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="288" rx="18" ry="18" fill="none" stroke="#000820" stroke-width="2.5"/>
  <circle cx="290" cy="292" r="13" fill="#80c8ff"/>
  <circle cx="290" cy="292" r="13" fill="none" stroke="#3878b0" stroke-width="1.5"/>
  <circle cx="290" cy="292" r="8" class="eye-pupil"/>
  <path d="M286,284 L284,290 L286,294 L290,290 Z" class="eye-highlight"/>

  <!-- mouth: small ancient smile -->
  <path d="M236,346 Q256,356 276,346" class="body-stroke" fill="none" stroke-width="3" stroke-linecap="round"/>

  <!-- ambient snowflakes -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.85" stroke-linecap="round">
    <line x1="60" y1="160" x2="68" y2="160"/>
    <line x1="64" y1="156" x2="64" y2="164"/>
    <line x1="450" y1="160" x2="458" y2="160"/>
    <line x1="454" y1="156" x2="454" y2="164"/>
  </g>
</svg>
