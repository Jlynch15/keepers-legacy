<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- ROOTWEAVER — grass, common — weaves roots into baskets, holding craft
       Mutations: v1 Root Brown · v2 Pale Wood · v3 Dark Earth · v4 Olive
       Signature: round body holding WOVEN BASKET in front (mid-craft)
  -->
  <!-- PALETTE
       v1: body-base=#80583a body-shadow=#3a2818 body-highlight=#a8805a body-stroke=#1a0800 accent-base=#5a3818 accent-shadow=#2a1808 accent-highlight=#806040
       v2: body-base=#d8b888 body-shadow=#806848 body-highlight=#f0d8a8 body-stroke=#382818 accent-base=#a08858 accent-shadow=#604828 accent-highlight=#d0a878
       v3: body-base=#4a3018 body-shadow=#1a0a00 body-highlight=#785838 body-stroke=#000000 accent-base=#3a1810 accent-shadow=#180800 accent-highlight=#604028
       v4: body-base=#788858 body-shadow=#384828 body-highlight=#a0b078 body-stroke=#101808 accent-base=#586830 accent-shadow=#283010 accent-highlight=#80a058
  -->
  <style>
    .body-base       { fill: #80583a; }
    .body-base       { stroke: #80583a; }
    .body-shadow     { fill: #3a2818; }
    .body-shadow     { stroke: #3a2818; }
    .body-highlight  { fill: #a8805a; }
    .body-highlight  { stroke: #a8805a; }
    .body-stroke     { fill: #1a0800; }
    .body-stroke     { stroke: #1a0800; }
    .accent-base     { fill: #5a3818; }
    .accent-base     { stroke: #5a3818; }
    .accent-shadow   { fill: #2a1808; }
    .accent-shadow   { stroke: #2a1808; }
    .accent-highlight{ fill: #806040; }
    .accent-highlight{ stroke: #806040; }
    .eye-iris        { fill: #3a7038; }
    .eye-pupil       { fill: #0a2008; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f0f8e0; }
    .mouth-interior  { fill: #2a1008; }
  </style>

  <!-- feet -->
  <ellipse cx="200" cy="442" rx="28" ry="13" class="body-shadow"/>
  <ellipse cx="312" cy="442" rx="28" ry="13" class="body-shadow"/>
  <ellipse cx="200" cy="438" rx="22" ry="9" class="body-base"/>
  <ellipse cx="312" cy="438" rx="22" ry="9" class="body-base"/>

  <!-- arms holding basket -->
  <ellipse cx="158" cy="328" rx="38" ry="16" class="body-shadow" transform="rotate(-25 158 328)"/>
  <ellipse cx="162" cy="324" rx="32" ry="12" class="body-base"   transform="rotate(-25 162 324)"/>
  <ellipse cx="354" cy="328" rx="38" ry="16" class="body-shadow" transform="rotate(25 354 328)"/>
  <ellipse cx="350" cy="324" rx="32" ry="12" class="body-base"   transform="rotate(25 350 324)"/>

  <!-- body -->
  <circle cx="256" cy="290" r="118" class="body-shadow"/>
  <circle cx="256" cy="284" r="110" class="body-base"/>
  <!-- VARIED HIGHLIGHT — small horizontal arc -->
  <path d="M212,228 Q230,218 248,224" class="body-highlight" fill="none" stroke-width="10" stroke-linecap="round" opacity="0.45"/>

  <!-- ═══════ WOVEN BASKET HELD IN FRONT (signature) ═══════ -->
  <ellipse cx="256" cy="392" rx="76" ry="22" class="accent-shadow"/>
  <path d="M180,392 Q256,344 332,392 Z" class="accent-shadow"/>
  <path d="M188,390 Q256,348 324,390 Z" class="accent-base"/>
  <!-- weave pattern lines -->
  <path d="M198,378 L312,378" class="accent-shadow" fill="none" stroke-width="2" opacity="0.85"/>
  <path d="M204,366 L308,366" class="accent-shadow" fill="none" stroke-width="2" opacity="0.85"/>
  <path d="M210,354 L302,354" class="accent-shadow" fill="none" stroke-width="2" opacity="0.85"/>
  <!-- vertical weaves -->
  <path d="M210,390 L218,348" class="accent-shadow" fill="none" stroke-width="1.5" opacity="0.7"/>
  <path d="M256,390 L256,348" class="accent-shadow" fill="none" stroke-width="1.5" opacity="0.7"/>
  <path d="M302,390 L294,348" class="accent-shadow" fill="none" stroke-width="1.5" opacity="0.7"/>
  <!-- in-progress root strand sticking out -->
  <path d="M270,348 Q278,330 290,332" class="accent-base" fill="none" stroke-width="3" stroke-linecap="round"/>

  <!-- ═══════ EYES (grass family — focused/narrow attentive) ═══════ -->
  <ellipse cx="220" cy="270" rx="22" ry="20" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="270" rx="18" ry="16" fill="none" stroke="#1a0800" stroke-width="2.5"/>
  <ellipse cx="222" cy="274" rx="11" ry="9" class="eye-iris"/>
  <ellipse cx="222" cy="274" rx="7" ry="6" class="eye-pupil"/>
  <ellipse cx="226" cy="266" rx="3" ry="2.5" class="eye-highlight" stroke="none"/>
  <ellipse cx="292" cy="270" rx="22" ry="20" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="270" rx="18" ry="16" fill="none" stroke="#1a0800" stroke-width="2.5"/>
  <ellipse cx="290" cy="274" rx="11" ry="9" class="eye-iris"/>
  <ellipse cx="290" cy="274" rx="7" ry="6" class="eye-pupil"/>
  <ellipse cx="286" cy="266" rx="3" ry="2.5" class="eye-highlight" stroke="none"/>

  <!-- mouth: tight focused smile -->
  <path d="M236,308 Q256,316 276,308" class="body-stroke" fill="none" stroke-width="2.5" stroke-linecap="round"/>

  <!-- cheek blush -->
  <ellipse cx="180" cy="300" rx="11" ry="7" fill="#a07050" opacity="0.42" stroke="none"/>
  <ellipse cx="332" cy="300" rx="11" ry="7" fill="#a07050" opacity="0.42" stroke="none"/>

  <!-- body specks -->
  <circle cx="246" cy="220" r="2" class="body-highlight" opacity="0.7" stroke="none"/>
  <circle cx="296" cy="248" r="2" class="body-highlight" opacity="0.6" stroke="none"/>

  <!-- ambient leaf flakes -->
  <ellipse cx="44"  cy="380" rx="5" ry="2" class="accent-base" opacity="0.55" transform="rotate(20 44 380)"/>
  <ellipse cx="468" cy="380" rx="5" ry="2" class="accent-base" opacity="0.55" transform="rotate(-20 468 380)"/>

  <!-- sparkles -->
  <path d="M88,180 L90,186 L96,188 L90,190 L88,196 L86,190 L80,188 L86,186 Z"
        fill="#ffffff" opacity="0.85"/>
  <path d="M424,180 L426,186 L432,188 L426,190 L424,196 L422,190 L416,188 L422,186 Z"
        fill="#ffffff" opacity="0.85"/>
</svg>
