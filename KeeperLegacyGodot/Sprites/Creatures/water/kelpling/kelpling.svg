<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- KELPLING — water, common — wears flowing kelp cape that sways even in still air
       Mutations: v1 Forest Green · v2 Dark Blue · v3 Brown · v4 Golden Yellow
       Signature: HUGE flowing kelp cape dominates silhouette (cape is the visual feature)
       SELF-CHECK vs prior water creatures:
         - All others have no cape → DIFFERENT (the cape is unique signature)
         - Eye treatment: round friendly with TEAR-DROP highlight (water dripping look)
         - Mouth: open soft "smile" with single visible upper tooth (cute bunny-like)
  -->
  <!-- PALETTE
       v1: body-base=#a8d090 body-shadow=#506838 body-highlight=#d8f0c0 body-stroke=#203018 accent-base=#306838 accent-shadow=#183020 accent-highlight=#80b070
       v2: body-base=#3060a0 body-shadow=#1a3868 body-highlight=#80a0d0 body-stroke=#0a1840 accent-base=#1a4070 accent-shadow=#0a1838 accent-highlight=#5080b8
       v3: body-base=#a08058 body-shadow=#604828 body-highlight=#d0b088 body-stroke=#2a1808 accent-base=#704830 accent-shadow=#3a2010 accent-highlight=#a07858
       v4: body-base=#e8c450 body-shadow=#a08020 body-highlight=#fff088 body-stroke=#4a3808 accent-base=#a87830 accent-shadow=#604010 accent-highlight=#e8b860
  -->
  <style>
    .body-base       { fill: #a8d090; }
    .body-base       { stroke: #a8d090; }
    .body-shadow     { fill: #506838; }
    .body-shadow     { stroke: #506838; }
    .body-highlight  { fill: #d8f0c0; }
    .body-highlight  { stroke: #d8f0c0; }
    .body-stroke     { fill: #203018; }
    .body-stroke     { stroke: #203018; }
    .accent-base     { fill: #306838; }
    .accent-base     { stroke: #306838; }
    .accent-shadow   { fill: #183020; }
    .accent-shadow   { stroke: #183020; }
    .accent-highlight{ fill: #80b070; }
    .accent-highlight{ stroke: #80b070; }
    .eye-iris        { fill: #1a4868; }
    .eye-pupil       { fill: #0a1828; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #d8eef0; }
    .mouth-interior  { fill: #2a0820; }
    .skin-base       { fill: #f0c890; }
    .skin-shadow     { fill: #a87850; }
  </style>

  <!-- ═══════ COMPOSITION — small creature inside a HUGE flowing kelp cape ═══════ -->

  <!-- ═══════ KELP CAPE (signature: dominant flowing cape) ═══════ -->
  <!-- back outer kelp shadow (sweeps wide) -->
  <path d="M104,240 Q72,160 130,98 Q174,76 218,84 Q256,72 294,84 Q338,76 382,98 Q440,160 408,240 Q452,320 432,420 Q400,460 360,452 Q320,460 290,448 Q258,460 222,448 Q186,460 152,452 Q108,460 80,420 Q60,320 104,240 Z"
        class="accent-shadow"/>
  <!-- main cape body -->
  <path d="M114,244 Q88,168 138,108 Q180,90 220,96 Q256,84 292,96 Q332,90 374,108 Q424,168 398,244 Q438,316 420,408 Q392,448 358,442 Q322,452 290,438 Q258,452 222,438 Q190,452 154,442 Q120,448 92,408 Q74,316 114,244 Z"
        class="accent-base"/>
  <!-- kelp drape lines/folds -->
  <path d="M156,200 Q150,280 162,360 Q170,400 158,432" class="accent-shadow" fill="none" stroke-width="3" opacity="0.7"/>
  <path d="M196,180 Q188,280 196,360 Q200,400 192,432" class="accent-shadow" fill="none" stroke-width="3" opacity="0.7"/>
  <path d="M312,180 Q320,280 312,360 Q308,400 316,432" class="accent-shadow" fill="none" stroke-width="3" opacity="0.7"/>
  <path d="M352,200 Q358,280 346,360 Q338,400 350,432" class="accent-shadow" fill="none" stroke-width="3" opacity="0.7"/>
  <!-- cape highlight (upper-left bias) -->
  <path d="M138,150 Q170,128 220,128 Q256,120 280,128 Q260,148 220,156 Q170,168 140,180 Q128,160 138,150 Z"
        class="accent-highlight" opacity="0.55"/>
  <!-- kelp leaf ruffle accents at bottom edge -->
  <path d="M120,432 Q132,448 144,432 Q156,448 168,432 Q180,448 192,432 Q204,448 216,432 Q228,448 240,432 Q252,448 264,432 Q276,448 288,432 Q300,448 312,432 Q324,448 336,432 Q348,448 360,432 Q372,448 384,432 Q396,448 408,432"
        class="accent-base" fill="none" stroke-width="6" stroke-linecap="round"/>

  <!-- ═══════ HEAD (peeks out through cape opening) ═══════ -->
  <ellipse cx="256" cy="252" rx="86" ry="92" class="body-shadow"/>
  <ellipse cx="256" cy="248" rx="80" ry="86" class="body-base"/>
  <ellipse cx="226" cy="208" rx="42" ry="38" class="body-highlight" opacity="0.55"/>

  <!-- ═══════ EYES (water family — round friendly with TEAR-DROP highlight) ═══════ -->
  <ellipse cx="226" cy="240" rx="22" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="226" cy="240" rx="18" ry="22" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle  cx="228" cy="246" r="14" class="eye-iris"/>
  <circle  cx="228" cy="246" r="9"  class="eye-pupil"/>
  <!-- Tear-drop highlight (water/kelp theme) -->
  <path d="M232,234 Q236,238 234,244 Q230,242 232,234 Z" class="eye-highlight" stroke="none"/>
  <circle cx="223" cy="252" r="2" class="eye-highlight" stroke="none"/>

  <ellipse cx="286" cy="240" rx="22" ry="26" class="eye-sclera" stroke="none"/>
  <ellipse cx="286" cy="240" rx="18" ry="22" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle  cx="284" cy="246" r="14" class="eye-iris"/>
  <circle  cx="284" cy="246" r="9"  class="eye-pupil"/>
  <path d="M280,234 Q284,238 282,244 Q278,242 280,234 Z" class="eye-highlight" stroke="none"/>
  <circle cx="289" cy="252" r="2" class="eye-highlight" stroke="none"/>

  <!-- ═══════ MOUTH (open soft smile with single upper tooth — cute) ═══════ -->
  <path d="M232,290 Q256,306 280,290 Q272,302 256,304 Q240,302 232,290 Z"
        class="mouth-interior" stroke-width="2"/>
  <!-- single visible tooth -->
  <path d="M252,294 L252,302 L260,302 L260,294 Z" fill="#ffffff" opacity="0.9"/>

  <!-- ═══════ CHEEK BLUSH ═══════ -->
  <ellipse cx="200" cy="276" rx="11" ry="7" fill="#ff80a0" opacity="0.42" stroke="none"/>
  <ellipse cx="312" cy="276" rx="11" ry="7" fill="#ff80a0" opacity="0.42" stroke="none"/>

  <!-- ═══════ BODY SPECKS (on visible head only) ═══════ -->
  <circle cx="220" cy="184" r="2" class="body-highlight" opacity="0.7" stroke="none"/>
  <circle cx="296" cy="200" r="2" class="body-highlight" opacity="0.6" stroke="none"/>
  <circle cx="216" cy="312" r="2" class="body-highlight" opacity="0.55" stroke="none"/>
  <circle cx="294" cy="318" r="2" class="body-highlight" opacity="0.55" stroke="none"/>

  <!-- ═══════ AMBIENT BUBBLES + drifting kelp specks ═══════ -->
  <circle cx="44"  cy="180" r="5" fill="none" stroke="#80c8e8" stroke-width="2" opacity="0.6"/>
  <circle cx="76"  cy="148" r="3" fill="none" stroke="#80c8e8" stroke-width="1.5" opacity="0.55"/>
  <circle cx="32"  cy="248" r="3" fill="none" stroke="#80c8e8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="468" cy="180" r="5" fill="none" stroke="#80c8e8" stroke-width="2" opacity="0.6"/>
  <circle cx="436" cy="148" r="3" fill="none" stroke="#80c8e8" stroke-width="1.5" opacity="0.55"/>
  <circle cx="480" cy="248" r="3" fill="none" stroke="#80c8e8" stroke-width="1.5" opacity="0.5"/>
  <!-- floating kelp specks -->
  <ellipse cx="58"  cy="320" rx="3" ry="6" class="accent-base" opacity="0.6" transform="rotate(20 58 320)"/>
  <ellipse cx="450" cy="320" rx="3" ry="6" class="accent-base" opacity="0.6" transform="rotate(-20 450 320)"/>
  <ellipse cx="38"  cy="400" rx="2" ry="5" class="accent-base" opacity="0.5" transform="rotate(40 38 400)"/>
  <ellipse cx="470" cy="400" rx="2" ry="5" class="accent-base" opacity="0.5" transform="rotate(-40 470 400)"/>

  <!-- ═══════ SPARKLE ACCENTS ═══════ -->
  <path d="M86,90  L88,98 L96,100 L88,102 L86,110 L84,102 L76,100 L84,98 Z"
        fill="#ffffff" opacity="0.85"/>
  <path d="M426,90 L428,98 L436,100 L428,102 L426,110 L424,102 L416,100 L424,98 Z"
        fill="#ffffff" opacity="0.85"/>
</svg>
