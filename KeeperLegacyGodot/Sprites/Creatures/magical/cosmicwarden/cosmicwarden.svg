<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- COSMICWARDEN — magical, RARE — final guardian, ancient cosmic
       Mutations: v1 Cosmic Purple · v2 Star Gold · v3 Deep Blue · v4 Ethereal Green
       Signature: regal commanding figure w/ COSMIC CAPE + galaxy swirl on chest
  -->
  <!-- PALETTE
       v1: body-base=#3818 60 body-shadow=#100828 body-highlight=#583098 body-stroke=#000010 accent-base=#a060f0 accent-shadow=#5828 a0 accent-highlight=#d098ff
       v2: body-base=#503010 body-shadow=#180800 body-highlight=#785030 body-stroke=#000000 accent-base=#ffd028 accent-shadow=#a07810 accent-highlight=#fff088
       v3: body-base=#102050 body-shadow=#000018 body-highlight=#283878 body-stroke=#000000 accent-base=#5078 c8 accent-shadow=#1a3878 accent-highlight=#88a8e8
       v4: body-base=#185040 body-shadow=#001818 body-highlight=#387868 body-stroke=#000000 accent-base=#80e8c8 accent-shadow=#388880 accent-highlight=#c0fff0
  -->
  <style>
    .body-base       { fill: #381860; }
    .body-base       { stroke: #381860; }
    .body-shadow     { fill: #100828; }
    .body-shadow     { stroke: #100828; }
    .body-highlight  { fill: #583098; }
    .body-highlight  { stroke: #583098; }
    .body-stroke     { fill: #000010; }
    .body-stroke     { stroke: #000010; }
    .accent-base     { fill: #a060f0; }
    .accent-base     { stroke: #a060f0; }
    .accent-shadow   { fill: #5828a0; }
    .accent-shadow   { stroke: #5828a0; }
    .accent-highlight{ fill: #d098ff; }
    .accent-highlight{ stroke: #d098ff; }
    .eye-iris        { fill: #d098ff; }
    .eye-pupil       { fill: #000010; }
    .eye-highlight   { fill: #ffffff; }
    .eye-sclera      { fill: #f0e0ff; }
    .mouth-interior  { fill: #000010; }
  </style>

  <!-- Custom glow: cosmic spiral galaxy + scattered stars (signature) -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="80"  cy="100" r="2"/>
    <circle cx="120" cy="60"  r="1.5"/>
    <circle cx="40"  cy="200" r="1.5"/>
    <circle cx="430" cy="100" r="2"/>
    <circle cx="380" cy="60"  r="1.5"/>
    <circle cx="470" cy="200" r="1.5"/>
    <circle cx="60"  cy="450" r="2"/>
    <circle cx="100" cy="490" r="1.5"/>
    <circle cx="450" cy="450" r="2"/>
    <circle cx="412" cy="490" r="1.5"/>
  </g>
  <!-- swirling cosmic backdrop -->
  <path d="M60,260 Q140,180 256,200 Q372,180 452,260 Q372,340 256,360 Q140,340 60,260 Z" fill="#a060f0" opacity="0.18"/>

  <!-- ═══════ COSMIC CAPE (signature: dark flowing cape behind body) ═══════ -->
  <path d="M120,200 Q80,300 110,440 Q160,460 220,440 Q256,448 292,440 Q352,460 402,440 Q432,300 392,200 Q256,180 120,200 Z" class="body-shadow"/>
  <path d="M130,206 Q92,300 122,432 Q170,448 224,432 Q256,438 288,432 Q342,448 390,432 Q420,300 382,206 Q256,188 130,206 Z" class="body-base"/>
  <!-- cape stars -->
  <circle cx="180" cy="280" r="2" fill="#ffffff"/>
  <circle cx="160" cy="356" r="1.5" fill="#ffffff"/>
  <circle cx="140" cy="416" r="1.5" fill="#ffffff"/>
  <circle cx="332" cy="280" r="2" fill="#ffffff"/>
  <circle cx="352" cy="356" r="1.5" fill="#ffffff"/>
  <circle cx="372" cy="416" r="1.5" fill="#ffffff"/>

  <!-- feet (regal) -->
  <ellipse cx="220" cy="446" rx="28" ry="13" class="body-shadow"/>
  <ellipse cx="292" cy="446" rx="28" ry="13" class="body-shadow"/>
  <ellipse cx="220" cy="442" rx="22" ry="9" class="body-base"/>
  <ellipse cx="292" cy="442" rx="22" ry="9" class="body-base"/>

  <!-- main body -->
  <ellipse cx="256" cy="306" rx="100" ry="124" class="body-shadow"/>
  <ellipse cx="256" cy="300" rx="94" ry="118" class="body-base"/>
  <ellipse cx="220" cy="240" rx="22" ry="14" class="body-highlight" opacity="0.55"/>

  <!-- ═══════ GALAXY SWIRL ON CHEST (signature) ═══════ -->
  <ellipse cx="256" cy="334" rx="44" ry="48" class="body-stroke"/>
  <ellipse cx="256" cy="334" rx="38" ry="42" fill="#000010"/>
  <!-- spiral arms -->
  <path d="M256,302 Q288,310 290,334 Q288,358 256,366 Q224,358 222,334 Q224,310 256,302" stroke="#a060f0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M256,310 Q278,316 282,334 Q278,352 256,358 Q234,352 230,334 Q234,316 256,310" stroke="#d098ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- center bright star -->
  <circle cx="256" cy="334" r="6" class="accent-highlight"/>
  <circle cx="256" cy="334" r="3" fill="#ffffff"/>
  <!-- star sparkles -->
  <circle cx="244" cy="320" r="1.5" fill="#ffffff"/>
  <circle cx="270" cy="346" r="1.5" fill="#ffffff"/>

  <!-- ═══════ EYES (magical — wise commanding) ═══════ -->
  <ellipse cx="220" cy="280" rx="20" ry="20" class="eye-sclera" stroke="none"/>
  <ellipse cx="220" cy="280" rx="16" ry="16" fill="none" stroke="#000010" stroke-width="2.5"/>
  <circle cx="222" cy="284" r="11" class="accent-base"/>
  <circle cx="222" cy="284" r="11" fill="none" stroke="#5828a0" stroke-width="1.5"/>
  <circle cx="222" cy="284" r="7" class="eye-pupil"/>
  <circle cx="226" cy="278" r="2" class="eye-highlight"/>
  <circle cx="218" cy="288" r="1.5" class="eye-highlight" opacity="0.85"/>
  <ellipse cx="292" cy="280" rx="20" ry="20" class="eye-sclera" stroke="none"/>
  <ellipse cx="292" cy="280" rx="16" ry="16" fill="none" stroke="#000010" stroke-width="2.5"/>
  <circle cx="290" cy="284" r="11" class="accent-base"/>
  <circle cx="290" cy="284" r="11" fill="none" stroke="#5828a0" stroke-width="1.5"/>
  <circle cx="290" cy="284" r="7" class="eye-pupil"/>
  <circle cx="286" cy="278" r="2" class="eye-highlight"/>
  <circle cx="294" cy="288" r="1.5" class="eye-highlight" opacity="0.85"/>

  <!-- regal crown above eyes -->
  <path d="M210,238 L228,210 L246,232 L256,200 L266,232 L284,210 L302,238" stroke="#a060f0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="200" r="3" class="accent-highlight"/>

  <!-- mouth: regal closed smile -->
  <path d="M236,400 Q256,410 276,400" class="body-stroke" fill="none" stroke-width="3" stroke-linecap="round"/>
</svg>
