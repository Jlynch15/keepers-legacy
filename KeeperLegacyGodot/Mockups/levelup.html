<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Keeper's Legacy — Level Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0C0907;
    --panel:      #1A1208;
    --border:     #3A2818;
    --header:     #080604;
    --header2:    #0F0A06;
    --text:       #F0E8D8;
    --muted:      #9A8070;
    --gold:       #E8B830;
    --gold-lt:    #F0CC50;
    --green:      #3A9040;
    --grass:      #4AB84A;
  }

  html, body {
    width: 1280px; height: 720px;
    overflow: hidden;
    background: #040306;
    font-family: 'Crimson Text', serif;
    color: var(--text);
  }

  /* ── ATMOSPHERIC BACKGROUND (gold-heavy celebratory) ── */
  .atmos {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 700px 500px at 50% 50%, rgba(30,20,8,0.9), transparent),
      radial-gradient(ellipse 500px 350px at 30% 40%, rgba(20,14,5,0.8), transparent),
      radial-gradient(ellipse 500px 350px at 70% 60%, rgba(20,14,5,0.7), transparent),
      linear-gradient(180deg, #050308 0%, #0A0806 30%, #0E0A06 60%, #080604 100%);
  }
  .atmos::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 500px 300px at 50% 40%, rgba(232,184,48,0.06), transparent),
      radial-gradient(ellipse 300px 200px at 25% 70%, rgba(232,184,48,0.03), transparent),
      radial-gradient(ellipse 300px 200px at 75% 30%, rgba(232,184,48,0.03), transparent);
    animation: atmos-breathe 8s ease-in-out infinite;
  }
  @keyframes atmos-breathe {
    0%,100% { opacity: 0.7; }
    50%     { opacity: 1; }
  }
  /* Subtle star field */
  .atmos::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(1px 1px at 10% 12%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 42% 18%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 58% 10%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 90% 22%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1.5px 1.5px at 18% 25%, rgba(232,184,48,0.3), transparent),
      radial-gradient(1.5px 1.5px at 82% 8%, rgba(232,184,48,0.25), transparent);
  }

  /* ── DARK OVERLAY ──────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse 600px 400px at 50% 50%, rgba(20,10,5,0.2), rgba(20,10,5,0.5));
  }

  /* ── FLOATING MYSTICAL PARTICLES ────────────────────── */
  .myst-particle {
    position: fixed; z-index: 2;
    border-radius: 50%;
    pointer-events: none;
    animation: myst-float var(--dur, 10s) ease-in-out infinite var(--dly, 0s);
  }
  @keyframes myst-float {
    0%,100% { transform: translateY(0) translateX(0) scale(1); opacity: var(--op1, 0.3); }
    30%     { transform: translateY(var(--dy1, -30px)) translateX(var(--dx1, 15px)) scale(1.2); opacity: var(--op2, 0.6); }
    60%     { transform: translateY(var(--dy2, -15px)) translateX(var(--dx2, -10px)) scale(0.8); opacity: var(--op1, 0.3); }
    80%     { transform: translateY(var(--dy3, -40px)) translateX(var(--dx3, 20px)) scale(1.1); opacity: var(--op2, 0.6); }
  }

  /* ── RISING CELEBRATORY PARTICLES ───────────────────── */
  .rising-particles {
    position: fixed; inset: 0; z-index: 3;
    pointer-events: none; overflow: hidden;
  }
  .rising {
    position: absolute; bottom: -20px;
    animation: rise-up linear infinite;
    opacity: 0;
  }
  @keyframes rise-up {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
    8%   { opacity: 0.8; }
    85%  { opacity: 0.5; }
    100% { transform: translateY(-780px) rotate(360deg) scale(0.4); opacity: 0; }
  }
  .rising-star { font-size: 16px; }
  .rising-sparkle { font-size: 12px; }
  .rising-dot {
    width: var(--s, 4px); height: var(--s, 4px);
    border-radius: 50%;
    background: rgba(232,184,48,0.5);
    box-shadow: 0 0 6px rgba(232,184,48,0.3);
  }

  /* ── SHIMMER GLINTS ─────────────────────────────────── */
  .shimmer-glint {
    position: fixed; z-index: 4;
    width: 2px; height: 2px;
    pointer-events: none;
    background: white;
    border-radius: 50%;
    animation: glint-flash var(--dur, 5s) ease-in-out infinite var(--dly, 0s);
  }
  .shimmer-glint::before, .shimmer-glint::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.6);
    border-radius: 1px;
  }
  .shimmer-glint::before {
    width: 1px; height: var(--len, 12px);
    left: 0; top: calc(50% - var(--len, 12px) / 2);
  }
  .shimmer-glint::after {
    width: var(--len, 12px); height: 1px;
    top: 0; left: calc(50% - var(--len, 12px) / 2);
  }
  @keyframes glint-flash {
    0%,82%,100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    88%         { opacity: var(--peak, 0.8); transform: scale(1) rotate(20deg); }
    94%         { opacity: 0.1; transform: scale(0.7) rotate(35deg); }
  }

  /* ── LEVEL UP CARD ─────────────────────────────────── */
  .levelup-card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 520px;
    background: var(--panel);
    border: 2px solid rgba(232,184,48,0.4);
    border-radius: 16px;
    box-shadow:
      0 0 80px rgba(232,184,48,0.15),
      0 12px 50px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    text-align: center;
  }

  /* Soft ambient edge glow */
  .levelup-card::before {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 24px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(232,184,48,0.15), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(232,184,48,0.08), transparent 55%),
      radial-gradient(ellipse at 0% 50%, rgba(232,184,48,0.05), transparent 50%),
      radial-gradient(ellipse at 100% 50%, rgba(232,184,48,0.05), transparent 50%);
    z-index: -1;
    filter: blur(14px);
    animation: card-breathe 4s ease-in-out infinite;
  }
  @keyframes card-breathe {
    0%,100% { opacity: 0.6; }
    50%     { opacity: 1; }
  }

  /* Parchment texture */
  .levelup-card::after {
    content: '';
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    border-radius: 16px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,0.010) 24px, rgba(255,255,255,0.010) 25px),
      repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(255,255,255,0.008) 24px, rgba(255,255,255,0.008) 25px);
  }

  /* Corner ornaments */
  .corner-ornament {
    position: absolute; z-index: 2;
    font-size: 14px; color: rgba(232,184,48,0.35);
    pointer-events: none; line-height: 1;
    animation: ornament-glow 4s ease-in-out infinite;
  }
  .corner-tl { top: 7px; left: 9px; }
  .corner-tr { top: 7px; right: 9px; }
  .corner-bl { bottom: 7px; left: 9px; }
  .corner-br { bottom: 7px; right: 9px; }
  @keyframes ornament-glow {
    0%,100% { color: rgba(232,184,48,0.3); text-shadow: none; }
    50%     { color: rgba(232,184,48,0.6); text-shadow: 0 0 6px rgba(232,184,48,0.3); }
  }

  /* Gold shimmer banner */
  .levelup-banner {
    position: relative; z-index: 1;
    background: linear-gradient(135deg, #1A1208 0%, #2A1E08 30%, rgba(232,184,48,0.3) 50%, #2A1E08 70%, #1A1208 100%);
    padding: 22px 24px 20px;
    border-bottom: 2px solid var(--gold);
    animation: shimmer 3s ease-in-out infinite;
    background-size: 300% 100%;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%       { background-position: 100% 50%; }
  }

  .level-up-label {
    font-family: 'Cinzel', serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Level number with magical aura */
  .level-number-wrap {
    position: relative;
    display: inline-block;
  }
  .level-number-aura {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,184,48,0.25), transparent 65%);
    animation: aura-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes aura-pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
    50%     { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  }
  .level-number-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 1px solid rgba(232,184,48,0.2);
    animation: ring-expand 2s ease-in-out infinite 0.5s;
    pointer-events: none;
  }
  @keyframes ring-expand {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.4; }
    50%     { transform: translate(-50%,-50%) scale(1.2); opacity: 0; }
  }
  .level-number {
    font-family: 'Cinzel', serif;
    font-size: 80px; font-weight: 700;
    color: #FFF8EC;
    line-height: 1;
    text-shadow:
      0 0 30px rgba(232,184,48,0.8),
      0 0 60px rgba(232,184,48,0.4),
      0 3px 8px rgba(0,0,0,0.5);
    letter-spacing: -2px;
    position: relative; z-index: 1;
    animation: level-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes level-pop {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Card body */
  .levelup-body {
    position: relative; z-index: 1;
    padding: 20px 32px;
  }

  .stars-row {
    display: flex; justify-content: center; gap: 10px;
    margin-bottom: 10px;
    font-size: 20px;
    animation: star-appear 0.4s ease-out 0.3s both;
  }
  .star { animation: star-spin 1.5s ease-out both; display: inline-block; }
  .star:nth-child(1) { animation-delay: 0.3s; }
  .star:nth-child(2) { animation-delay: 0.5s; }
  .star:nth-child(3) { animation-delay: 0.7s; }
  @keyframes star-spin {
    0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
    60%  { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes star-appear {
    0%   { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  .levelup-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic; font-size: 20px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .levelup-divider {
    width: 80px; height: 2px;
    margin: 0 auto 18px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* Rewards list */
  .rewards-list {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 20px;
  }
  .reward-row {
    display: flex; align-items: center; gap: 14px;
    border-radius: 10px;
    padding: 12px 16px;
    animation: reward-slide 0.4s ease-out both;
    position: relative;
    overflow: hidden;
  }
  .reward-row:nth-child(1) { animation-delay: 0.6s; }
  .reward-row:nth-child(2) { animation-delay: 0.8s; }
  .reward-row:nth-child(3) { animation-delay: 1.0s; }
  @keyframes reward-slide {
    0%   { transform: translateX(-20px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  /* Default reward style (coins) */
  .reward-row {
    background: rgba(232,184,48,0.06);
    border: 2.5px solid rgba(232,184,48,0.25);
  }
  /* Habitat-colored unlock rows */
  .reward-row.grass-unlock {
    background: linear-gradient(90deg, rgba(74,184,74,0.08), rgba(232,184,48,0.04));
    border-color: rgba(74,184,74,0.35);
  }
  .reward-row.breed-unlock {
    background: linear-gradient(90deg, rgba(152,96,224,0.08), rgba(232,184,48,0.04));
    border-color: rgba(152,96,224,0.35);
  }

  .reward-icon {
    font-size: 28px; line-height: 1; flex-shrink: 0;
    width: 36px; text-align: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .reward-text { flex: 1; text-align: left; }
  .reward-title {
    font-family: 'Cinzel', serif;
    font-size: 14px; font-weight: 600;
    color: var(--text); margin-bottom: 2px;
  }
  .reward-desc {
    font-family: 'Crimson Text', serif;
    font-size: 13px; color: var(--muted);
  }
  .reward-value {
    font-family: 'Cinzel', serif;
    font-size: 16px; font-weight: 700;
    color: var(--gold); white-space: nowrap;
    text-shadow: 0 0 8px rgba(232,184,48,0.3);
  }
  .reward-value.unlock {
    font-size: 11px;
    color: var(--green);
    background: rgba(58,144,64,0.12);
    padding: 4px 10px; border-radius: 10px;
    border: 1px solid rgba(58,144,64,0.3);
    text-shadow: none;
    letter-spacing: 0.5px;
  }
  .reward-value.unlock.purple {
    color: rgba(180,140,240,0.9);
    background: rgba(152,96,224,0.12);
    border-color: rgba(152,96,224,0.3);
  }

  /* Continue button */
  .levelup-footer {
    position: relative; z-index: 1;
    padding: 0 32px 26px;
  }
  .continue-btn {
    width: 100%;
    font-family: 'Cinzel', serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.5px;
    padding: 14px 48px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: linear-gradient(180deg, var(--header2) 0%, var(--header) 100%);
    color: var(--gold-lt);
    cursor: pointer;
    box-shadow: 0 0 20px rgba(232,184,48,0.1), 0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: all 0.15s;
  }
  .continue-btn:hover {
    background: linear-gradient(180deg, #2A2008 0%, #1A1208 100%);
    box-shadow: 0 0 30px rgba(232,184,48,0.2), 0 6px 20px rgba(0,0,0,0.6);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<!-- ── ATMOSPHERIC BACKGROUND ─────────────────────────── -->
<div class="atmos"></div>
<div class="overlay"></div>

<!-- ── FLOATING MYSTICAL PARTICLES ─────────────────────── -->
<div class="myst-particle" style="left:6%; top:22%; width:4px; height:4px; background:rgba(232,184,48,0.3); box-shadow:0 0 8px rgba(232,184,48,0.2); --dur:14s; --dly:0s; --dy1:-30px; --dx1:12px; --dy2:-15px; --dx2:-8px; --dy3:-40px; --dx3:18px; --op1:0.2; --op2:0.5"></div>
<div class="myst-particle" style="left:20%; top:60%; width:3px; height:3px; background:rgba(232,184,48,0.25); box-shadow:0 0 6px rgba(232,184,48,0.15); --dur:18s; --dly:3s; --dy1:-25px; --dx1:-10px; --dy2:-40px; --dx2:15px; --dy3:-20px; --dx3:-12px; --op1:0.15; --op2:0.4"></div>
<div class="myst-particle" style="left:78%; top:18%; width:5px; height:5px; background:rgba(232,184,48,0.3); box-shadow:0 0 10px rgba(232,184,48,0.2); --dur:12s; --dly:1s; --dy1:-40px; --dx1:20px; --dy2:-20px; --dx2:-15px; --dy3:-50px; --dx3:8px; --op1:0.2; --op2:0.55"></div>
<div class="myst-particle" style="left:90%; top:68%; width:3px; height:3px; background:rgba(232,184,48,0.2); box-shadow:0 0 6px rgba(232,184,48,0.1); --dur:16s; --dly:5s; --dy1:-20px; --dx1:-8px; --dy2:-35px; --dx2:12px; --dy3:-25px; --dx3:-15px; --op1:0.1; --op2:0.35"></div>
<div class="myst-particle" style="left:42%; top:82%; width:4px; height:4px; background:rgba(232,184,48,0.25); box-shadow:0 0 8px rgba(232,184,48,0.15); --dur:15s; --dly:2s; --dy1:-35px; --dx1:15px; --dy2:-50px; --dx2:-10px; --dy3:-20px; --dx3:12px; --op1:0.15; --op2:0.45"></div>
<div class="myst-particle" style="left:55%; top:12%; width:3px; height:3px; background:rgba(232,184,48,0.3); box-shadow:0 0 6px rgba(232,184,48,0.2); --dur:20s; --dly:7s; --dy1:-30px; --dx1:-12px; --dy2:-45px; --dx2:8px; --dy3:-15px; --dx3:-10px; --op1:0.15; --op2:0.4"></div>
<div class="myst-particle" style="left:12%; top:42%; width:3px; height:3px; background:rgba(232,184,48,0.2); box-shadow:0 0 6px rgba(232,184,48,0.1); --dur:17s; --dly:8s; --dy1:-25px; --dx1:10px; --dy2:-40px; --dx2:-14px; --dy3:-30px; --dx3:6px; --op1:0.1; --op2:0.3"></div>
<div class="myst-particle" style="left:85%; top:40%; width:4px; height:4px; background:rgba(232,184,48,0.25); box-shadow:0 0 8px rgba(232,184,48,0.15); --dur:13s; --dly:4s; --dy1:-45px; --dx1:-15px; --dy2:-20px; --dx2:10px; --dy3:-35px; --dx3:-8px; --op1:0.15; --op2:0.45"></div>

<!-- ── RISING CELEBRATORY PARTICLES ────────────────────── -->

  <span class="rising rising-star" style="left:8%;  animation-delay:0s;   animation-duration:3.5s">✨</span>
  <span class="rising rising-star" style="left:18%; animation-delay:0.6s; animation-duration:4.0s">⭐</span>
  <span class="rising rising-sparkle" style="left:28%; animation-delay:1.2s; animation-duration:3.2s">✦</span>
  <span class="rising rising-star" style="left:38%; animation-delay:0.3s; animation-duration:3.8s">✨</span>
  <div class="rising rising-dot" style="left:45%; animation-delay:1.8s; animation-duration:3.0s; --s:3px"></div>
  <span class="rising rising-star" style="left:52%; animation-delay:0.9s; animation-duration:4.2s">⭐</span>
  <span class="rising rising-sparkle" style="left:60%; animation-delay:1.5s; animation-duration:3.4s">✦</span>
  <span class="rising rising-star" style="left:68%; animation-delay:0.2s; animation-duration:3.6s">✨</span>
  <div class="rising rising-dot" style="left:74%; animation-delay:2.0s; animation-duration:2.8s; --s:4px"></div>
  <span class="rising rising-star" style="left:82%; animation-delay:0.7s; animation-duration:4.1s">⭐</span>
  <span class="rising rising-sparkle" style="left:90%; animation-delay:1.1s; animation-duration:3.3s">✦</span>
  <div class="rising rising-dot" style="left:15%; animation-delay:2.2s; animation-duration:3.7s; --s:3px"></div>
  <span class="rising rising-star" style="left:95%; animation-delay:1.6s; animation-duration:3.9s">✨</span>
  <span class="rising rising-sparkle" style="left:5%; animation-delay:0.4s; animation-duration:3.1s">✦</span>
  <div class="rising rising-dot" style="left:55%; animation-delay:2.5s; animation-duration:2.9s; --s:5px"></div>
</div>

<!-- ── SHIMMER GLINTS ──────────────────────────────────── -->
<div class="shimmer-glint" style="left:15%; top:20%; --dur:3.5s; --dly:0s; --len:14px; --peak:0.8"></div>
<div class="shimmer-glint" style="left:80%; top:25%; --dur:5s; --dly:1.5s; --len:10px; --peak:0.6"></div>
<div class="shimmer-glint" style="left:30%; top:75%; --dur:4.5s; --dly:3s; --len:12px; --peak:0.7"></div>
<div class="shimmer-glint" style="left:88%; top:60%; --dur:4s; --dly:0.8s; --len:10px; --peak:0.5"></div>
<div class="shimmer-glint" style="left:50%; top:10%; --dur:6s; --dly:2s; --len:16px; --peak:0.9"></div>
<div class="shimmer-glint" style="left:8%; top:50%; --dur:5.5s; --dly:4s; --len:10px; --peak:0.6"></div>
<div class="shimmer-glint" style="left:70%; top:80%; --dur:4.2s; --dly:5s; --len:12px; --peak:0.65"></div>
<div class="shimmer-glint" style="left:40%; top:35%; --dur:5.8s; --dly:6s; --len:14px; --peak:0.7"></div>

<!-- ── LEVEL UP CARD ─────────────────────────────────── -->
<div class="levelup-card">

  <!-- Corner ornaments -->
  <span class="corner-ornament corner-tl">✦</span>
  <span class="corner-ornament corner-tr">✦</span>
  <span class="corner-ornament corner-bl">✦</span>
  <span class="corner-ornament corner-br">✦</span>

  <!-- Gold banner -->
  <div class="levelup-banner">
    <div class="level-up-label">— Level Up! —</div>
    <div class="level-number-wrap">
      <div class="level-number-aura"></div>
      <div class="level-number-ring"></div>
      <div class="level-number">13</div>
    </div>
  </div>

  <!-- Body -->
  <div class="levelup-body">

    <div class="stars-row">
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
    </div>

    <div class="levelup-subtitle">"Your bond with the creatures grows stronger."</div>
    <div class="levelup-divider"></div>

    <div class="rewards-list">

      <div class="reward-row">
        <span class="reward-icon">✦</span>
        <div class="reward-text">
          <div class="reward-title">Coin Bonus</div>
          <div class="reward-desc">Milestone reward</div>
        </div>
        <span class="reward-value">+ 200</span>
      </div>

      <div class="reward-row grass-unlock">
        <span class="reward-icon">🌿</span>
        <div class="reward-text">
          <div class="reward-title">New Habitat Slot</div>
          <div class="reward-desc">Grass Habitat unlocked</div>
        </div>
        <span class="reward-value unlock">UNLOCKED</span>
      </div>

      <div class="reward-row breed-unlock">
        <span class="reward-icon">🧬</span>
        <div class="reward-text">
          <div class="reward-title">Breeding Tier II</div>
          <div class="reward-desc">Uncommon pairings now available</div>
        </div>
        <span class="reward-value unlock purple">UNLOCKED</span>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <div class="levelup-footer">
    <button class="continue-btn">Continue →</button>
  </div>

</div>

</body>
